apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: guestbook
      tier: web
  template:
    metadata:
      labels:
        app: guestbook
        tier: web
    spec:
      containers:
        - name: app
          image: guestbook-app:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: MONGODB_URI
              value: mongodb://mongo:27017/guestbook
